name: 🚀 Daily Vibe App Deploy

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      day:
        description: 'Day number to deploy (1-30). Leave empty for auto.'
        required: false
        type: string
      force_regenerate:
        description: 'Force regenerate code even if app exists'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pipeline dependencies
        working-directory: scripts
        run: npm install

      - name: Determine day number
        id: day
        run: |
          if [ -n "${{ github.event.inputs.day }}" ]; then
            DAY="${{ github.event.inputs.day }}"
          else
            START="${{ secrets.SPRINT_START_DATE }}"
            if [ -z "$START" ]; then
              DAY=1
            else
              TODAY=$(date -u +%Y-%m-%d)
              DIFF=$(( ( $(date -d "$TODAY" +%s) - $(date -d "$START" +%s) ) / 86400 + 1 ))
              if [ $DIFF -lt 1 ]; then DAY=1
              elif [ $DIFF -gt 30 ]; then DAY=30
              else DAY=$DIFF
              fi
            fi
          fi
          echo "day=$DAY" >> $GITHUB_OUTPUT
          echo "Building Day $DAY"

      - name: Generate app code via Claude
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DAY: ${{ steps.day.outputs.day }}
          FORCE_REGENERATE: ${{ github.event.inputs.force_regenerate }}
        run: node generate-app.js

      - name: Build Vite app
        working-directory: scripts
        env:
          DAY: ${{ steps.day.outputs.day }}
        run: node build-app.js

      - name: Update deployments log
        working-directory: scripts
        env:
          DAY: ${{ steps.day.outputs.day }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node update-log.js

      - name: Commit app source
        run: |
          git config user.name "Vibe Bot"
          git config user.email "vibe-bot@users.noreply.github.com"
          git add apps/ deployments.md portal/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Day ${{ steps.day.outputs.day }} deployed"
          git push

      - name: Prepare GitHub Pages output
        run: |
          mkdir -p gh-pages-root
          cp portal/index.html gh-pages-root/index.html 2>/dev/null || echo "<h1>Vibe Sprint</h1>" > gh-pages-root/index.html
          for dir in dist/*/; do
            [ -d "$dir" ] || continue
            slug=$(basename "$dir")
            mkdir -p gh-pages-root/$slug
            cp -r $dir* gh-pages-root/$slug/ 2>/dev/null || true
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-root

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Print deploy summary
        run: |
          REPO="${{ github.repository }}"
          OWNER=$(echo $REPO | cut -d/ -f1 | tr '[:upper:]' '[:lower:]')
          REPONAME=$(echo $REPO | cut -d/ -f2)
          DAY="${{ steps.day.outputs.day }}"
          SLUG=$(node -e "const a=require('./apps-config/apps.json');console.log(a.find(x=>x.day==$DAY)?.slug||'')" 2>/dev/null)
          APP=$(node -e "const a=require('./apps-config/apps.json');console.log(a.find(x=>x.day==$DAY)?.name||'')" 2>/dev/null)
          URL="https://${OWNER}.github.io/${REPONAME}/${SLUG}/"
          echo "Day $DAY: $APP → $URL"
          echo "### ✅ Day $DAY: $APP" >> $GITHUB_STEP_SUMMARY
          echo "🌐 [$URL]($URL)" >> $GITHUB_STEP_SUMMARY
